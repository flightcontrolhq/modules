inputs:
  - id: tool_version
    label: Tool version
    type: string
    required: true
    default: 1.11.5
    patterns:
      - message: Must be a valid semver version (e.g., 1.0.0)
        pattern: ^\d+\.\d+\.\d+$
  - id: ravion_backend_workspace
    label: Ravion Workspace Name
    type: string
    required: false
  - id: terraform_variables
    label: Terraform Variables
    type: object
  - id: change_pipeline_id
    label: Change pipeline ID
    type: string
    required: true
    values: $values:ravion/pipelines
  - id: delete_pipeline_id
    label: Delete pipeline ID
    type: string
    required: true
    values: $values:ravion/pipelines
  - id: execution_environment_id
    label: Execution environment ID
    type: string
    required: true
    values: $values:ravion/execution_environments
  # ---------------------------------------------------------------------------
  # Build inputs — drive the zip artifact produced by the `build:` step below.
  # ---------------------------------------------------------------------------
  - id: app_repo
    label: Application repository
    type: string
    required: true
    description: HTTPS clone URL of the repository containing the Lambda source code.
  - id: app_branch
    label: Application branch
    type: string
    required: true
    default: main
  - id: app_base_path
    label: Application base path
    type: string
    required: false
    default: .
    description: Path within the app repository where the Lambda source lives.
  - id: app_dockerfile
    label: Dockerfile
    type: string
    required: false
    default: Dockerfile
    description: Path to the Dockerfile used to build the Lambda zip artifact (relative to the base path).
  - id: app_output_directory
    label: Build output directory
    type: string
    required: true
    default: /var/task
    description: Path inside the built image whose contents get zipped and uploaded to S3.
  - id: app_service_id
    label: Build service id
    type: string
    required: false
    description: Optional identifier embedded in the zip filename for audit; defaults to the function name.
  # ---------------------------------------------------------------------------
  # Deploy inputs — drive the alias flip in the `deploy:` step below.
  # ---------------------------------------------------------------------------
  - id: alias_name
    label: Alias name
    type: string
    required: true
    default: live
    description: Lambda alias the deploy step flips onto each newly-published version.
stack:
  type: terraform
  ravion_state_backend_workspace: << module.input.ravion_backend_workspace >>
  pipelines:
    defaults:
      input:
        base_path: ./compute/lambda
        branch: main
        execution_environment_id: << module.input.execution_environment_id >>
        ref: ""
        repo: https://github.com/flightcontrolhq/modules
        stack_id: <<stack.id>>
        terraform_variables: <<module.input.terraform_variables>>
        tool: opentofu
        tool_version: << module.input.tool_version >>
      variant: standard
    change:
      pipeline_id: << module.input.change_pipeline_id >>
    destroy:
      pipeline_id: << module.input.delete_pipeline_id >>
build:
  type: lambda
  inputs: []
  source:
    type: git
    repo: << module.input.app_repo >>
    branch: << module.input.app_branch >>
    base_path: << module.input.app_base_path >>
  builder:
    type: dockerfile
    dockerfile: << module.input.app_dockerfile >>
    output_directory: << module.input.app_output_directory >>
    service_id: << module.input.app_service_id >>
  destinations:
    # `key` is the S3 key *prefix* the build uploads under. The runner
    # always appends `lambda-package-<app_service_id>.zip` to it, so the
    # resulting artifact lives at
    #   s3://<code_bucket_id>/<key>/lambda-package-<app_service_id>.zip
    # The build step's output `s3_key` is the full path (prefix +
    # filename) — wire that directly into the deploy step.
    - id: lambda-zip
      type: s3
      bucket: << stack.output.code_bucket_id >>
      key: builds/<< pipeline.run.id >>
      region: << stack.output.region >>
  infrastructure:
    execution_environment_id: << module.input.execution_environment_id >>
deploy:
  type: aws:lambda
  infrastructure:
    function_arn: << stack.output.function_arn >>
    region: << stack.output.region >>
    alias_name: << module.input.alias_name >>
    s3_artifact_bucket: << stack.output.code_bucket_id >>
  inputs:
    - id: s3_key
      type: string
      label: S3 zip key
      required: true
      description: S3 key the build step uploaded the zip artifact to. Typically wired from the upstream build step's `s3_key` output.
    - id: s3_object_version
      type: string
      label: S3 object version
      required: false
      description: Optional S3 object version when the artifact bucket has versioning enabled.
  definition:
    package_type: zip
    s3_key: << deploy.input.s3_key >>
    s3_object_version: << deploy.input.s3_object_version >>
readme: |
  ## AWS Lambda Module

  This module provisions and manages an AWS Lambda function, builds the
  function's zip artifact from a source repository, and deploys new
  versions onto a named alias. It bundles three concerns into one
  module so a single module instance is the source of truth for the
  function: infrastructure (terraform), build (zip → S3), and deploy
  (UpdateFunctionCode → PublishVersion → UpdateAlias).

  ### What this module does
  - **Provisions** the Lambda function (and optional code bucket, log
    group, IAM role, function URL, event source mappings, aliases) via
    the underlying Terraform/OpenTofu stack at `./compute/lambda`.
  - **Builds** a zip package from a Dockerfile-based app build and
    uploads it to the S3 code bucket the stack created.
  - **Deploys** new code by calling `UpdateFunctionCode` on the
    function, waiting for `LastUpdateStatus=Successful`, publishing a
    new immutable version, and flipping the configured alias onto it
    with optimistic-concurrency on the alias `RevisionId`.

  ### Inputs

  #### Stack inputs
  - `tool_version`: Version of OpenTofu / Terraform to run the stack with.
  - `ravion_backend_workspace`: Optional Ravion state backend workspace name.
  - `terraform_variables`: Variables passed to the underlying Terraform/OpenTofu
    configuration (function `name`, `region`, `package_type`, `runtime`,
    `handler`, `memory_size`, `timeout`, IAM role config, VPC config,
    event source mappings, aliases, Lambda@Edge mode, etc. — see
    `variables.tf`).
  - `change_pipeline_id`: Pipeline used for change operations (`terraform apply`).
  - `delete_pipeline_id`: Pipeline used for destroy operations (`terraform destroy`).
  - `execution_environment_id`: Execution environment used to run the stack and the build.

  #### Build inputs
  - `app_repo`: HTTPS URL of the repository that contains the Lambda
    source code. Distinct from the modules repo — this is the user's
    application code.
  - `app_branch`: Branch of the app repo to build from. Defaults to `main`.
  - `app_base_path`: Path within the app repo where the source lives.
    Defaults to the repo root.
  - `app_dockerfile`: Path to the Dockerfile (relative to `app_base_path`)
    that produces the Lambda runtime image. Defaults to `Dockerfile`.
  - `app_output_directory`: Path inside the built image whose contents
    get zipped and uploaded to S3. Defaults to `/var/task` (the
    canonical Lambda Zip layout).
  - `app_service_id`: Optional identifier embedded in the zip filename
    for audit.

  #### Deploy inputs
  - `alias_name`: Lambda alias the deploy flips onto each newly-published
    version. Defaults to `live`. The alias must already exist on the
    function — it is created by the Terraform stack's `aliases` map and
    only mutated by the deploy step.

  ### Build → Deploy contract

  The `build:` step produces a zip artifact at
  `s3://<code_bucket_id>/builds/<pipeline.run.id>/lambda-package-<app_service_id>.zip`,
  using the bucket created by the stack's `code_bucket` resource. The
  destination's `key` is a per-pipeline-run prefix; the runner appends
  `lambda-package-<app_service_id>.zip` to it. The build's
  `s3_key` output is the full path (prefix + filename), ready to feed
  directly into the deploy step.

  The `deploy:` step expects two deploy inputs:
  - `s3_key` — wired from the upstream build step's output, typically
    `<< steps.build.output.s3_key >>` in the pipeline.
  - `s3_object_version` — optional; set when the bucket has versioning
    enabled and the deploy should pin a specific version of the
    artifact.

  ### Deploy phases

  1. **CapturePreviousAlias** — read the alias's current `function_version`
     and `RevisionId`. The version becomes `previous_published_version`
     on the deploy row (rollback target). The `RevisionId` is threaded
     into UpdateAlias as the optimistic-concurrency precondition.
  2. **UpdateFunctionCode** — apply the new S3 zip artifact.
  3. **WaitForLambdaUpdated** — poll `GetFunctionConfiguration` until
     `LastUpdateStatus` reaches `Successful` (or `Failed` — fails the deploy).
  4. **PublishVersion** — mint a new numbered version of the function.
  5. **UpdateAlias** — flip the alias onto the new version with the
     captured `RevisionId` as a precondition. Concurrent deploys can't
     silently clobber each other — the second one gets a clear
     "revision mismatch" error and the user can rerun.

  ### Container-image Lambda

  This module's `build` is wired for the Zip packaging mode. To deploy
  a container-image-packaged Lambda, either:
  - Set `terraform_variables.package_type: Image` + `terraform_variables.image_uri`
    and skip the `build:` step (provide `image_uri` to the function
    directly via Terraform), or
  - Use a sibling `image`-type module build elsewhere in the project
    and reference its ECR output as `deploy.input.image_uri`. The
    deploy step's `LambdaImageDefinition` variant accepts `image_uri`
    instead of `s3_key`.

  ### Repository
  Source code: https://github.com/flightcontrolhq/modules

  ### Notes
  The stack is configured to run from `./compute/lambda` in the modules
  repository and uses the configured pipelines for change and destroy
  actions. Review the input values carefully — especially
  `terraform_variables` (IAM role, VPC config, event source mappings)
  and the build's `app_dockerfile` / `app_output_directory` — before
  deploying.

output:
  function_name: string
  function_arn: string
  function_invoke_arn: string
  function_qualified_arn: string
  function_version: string
  role_arn: string
  log_group_name: string
  function_url: string
  code_bucket_id: string
  code_bucket_arn: string
  code_object_key: string
  region: string
